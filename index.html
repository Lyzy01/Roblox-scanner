<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Roblox Game Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --panel: #111116;
            --accent: #007aff;
            --danger: #ff453a;
            --success: #32d74b;
            --warning: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #98989d;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* Splash Screen */
        #introOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1s ease, visibility 1s;
        }

        .ambient-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); filter: blur(120px); opacity: 0.15; z-index: -1; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .container { width: 100%; max-width: 500px; padding: 20px; z-index: 1; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-weight: 800; font-size: 32px; letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-box { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 8px; border-radius: 24px; display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; background: transparent; border: none; outline: none; color: white; padding: 12px 18px; font-size: 15px; }
        button { background: var(--accent); color: white; border: none; padding: 0 28px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        
        .loader { display: none; text-align: center; margin: 30px 0; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }

        .result-card { background: var(--panel); border-radius: 32px; border: 1px solid var(--border); overflow: hidden; display: none; opacity: 0; transform: translateY(20px); transition: all 0.6s ease; }
        .thumbnail-area { width: 100%; height: 220px; position: relative; background: #000; }
        #gameThumb { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .risk-badge { position: absolute; top: 20px; right: 20px; padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 800; backdrop-filter: blur(12px); background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }

        .info-content { padding: 30px; }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .metric-box { background: var(--glass); border: 1px solid var(--border); padding: 18px; border-radius: 20px; }
        .label { display: block; color: var(--text-dim); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .value { font-size: 17px; font-weight: 700; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="introOverlay">
    <h2 style="letter-spacing:6px; font-weight:800; margin-bottom:10px; animation: pulse 2s infinite;">NEXUS</h2>
    <p style="color:var(--text-dim); font-size:12px; letter-spacing:2px; margin-bottom:40px;">DEVELOPED BY LYZY</p>
    <div style="text-align:center; opacity:0; animation: fadeIn 1s forwards 1.2s;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon_black.svg" style="width:25px; filter:invert(1); margin-bottom:8px;">
        <p style="font-size:9px; color:var(--accent); font-weight:800; letter-spacing:1px;">POWERED BY ROBLOX API</p>
    </div>
</div>

<div class="ambient-glow"></div>

<div class="container">
    <div class="header">
        <h1>NEXUS ANALYSIS</h1>
        <p style="font-size: 12px; color: var(--text-dim);">Security Metadata Engine</p>
    </div>

    <div class="search-box">
        <input type="text" id="gameInput" placeholder="Paste Link or Game ID">
        <button id="scanBtn">Analyze</button>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 11px; color: var(--text-dim); letter-spacing: 2px;">DECRYPTING...</p>
    </div>

    <div class="result-card" id="resultCard">
        <div class="thumbnail-area">
            <img id="gameThumb" src="">
            <div id="riskBadge" class="risk-badge">SCANNING...</div>
        </div>

        <div class="info-content">
            <h2 id="displayTitle" style="font-size:22px; font-weight:800; margin-bottom:8px;">---</h2>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:25px;">
                <img id="creatorImg" src="" style="width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:#000;">
                <span style="color:var(--text-dim); font-size:14px;">By <strong id="displayCreator" style="color:white">---</strong></span>
            </div>

            <div class="metrics-grid">
                <div class="metric-box">
                    <span class="label">Safety Score</span>
                    <div class="value" id="resScore">0%</div>
                </div>
                <div class="metric-box">
                    <span class="label">Total Visits</span>
                    <div class="value" id="resVisits">0</div>
                </div>
                <div class="metric-box">
                    <span class="label">Creator Age</span>
                    <div class="value" id="resAge">---</div>
                </div>
                <div class="metric-box">
                    <span class="label">Status</span>
                    <div class="value" id="resStatus">---</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = window.location.origin;

    // Handle Intro
    window.addEventListener('load', () => {
        setTimeout(() => {
            const intro = document.getElementById('introOverlay');
            intro.style.opacity = '0';
            setTimeout(() => intro.style.display = 'none', 1000);
        }, 2500);
    });

    const scanBtn = document.getElementById('scanBtn');
    const input = document.getElementById('gameInput');

    function getCleanId(val) {
        const match = val.match(/games\/(\d+)/);
        return match ? match[1] : val.replace(/\D/g, '');
    }

    scanBtn.addEventListener('click', async () => {
        const cleanId = getCleanId(input.value.trim());
        if(!cleanId) return;

        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const response = await fetch(`${BACKEND_URL}/api/scan/${cleanId}`);
            const data = await response.json();

            document.getElementById('gameThumb').src = data.thumbnail;
            document.getElementById('creatorImg').src = data.creatorThumb;
            document.getElementById('displayTitle').innerText = data.name;
            document.getElementById('displayCreator').innerText = data.creator;
            document.getElementById('resScore').innerText = data.safetyScore + "%";
            document.getElementById('resVisits').innerText = data.visits;
            document.getElementById('resAge').innerText = data.age;

            const badge = document.getElementById('riskBadge');
            let color = data.riskLevel === "LOW" ? "var(--success)" : (data.riskLevel === "MEDIUM" ? "var(--warning)" : "var(--danger)");
            
            badge.innerText = `${data.riskLevel} RISK`;
            badge.style.color = color;
            document.getElementById('resScore').style.color = color;
            document.getElementById('resStatus').innerText = data.riskLevel === "LOW" ? "Verified" : "Caution";
            document.getElementById('resStatus').style.color = color;

            document.getElementById('loader').style.display = 'none';
            document.getElementById('resultCard').style.display = 'block';
            setTimeout(() => {
                document.getElementById('resultCard').style.opacity = '1';
                document.getElementById('resultCard').style.transform = 'translateY(0)';
            }, 50);
        } catch (err) {
            alert("Error fetching data.");
            document.getElementById('loader').style.display = 'none';
        }
    });
</script>
</body>
</html>
