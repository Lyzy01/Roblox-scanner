<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Roblox Game Checker</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --panel: #111116;
            --accent: #007aff;
            --danger: #ff453a;
            --success: #32d74b;
            --warning: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #98989d;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 1;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-weight: 800; 
            font-size: 32px; 
            letter-spacing: -2px; 
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: var(--text-dim); font-size: 14px; font-weight: 500; }

        .search-box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 24px;
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .search-box:focus-within {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 12px 18px;
            font-size: 15px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .loader {
            display: none;
            text-align: center;
            margin: 30px 0;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        .result-card {
            background: var(--panel);
            border-radius: 32px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .thumbnail-area {
            width: 100%;
            height: 220px;
            position: relative;
            background: #000;
        }

        #gameThumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        .risk-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            backdrop-filter: blur(12px);
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .info-content { padding: 30px; }
        .game-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
        .creator-tag { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .metric-box {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .metric-box:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-4px);
            border-color: rgba(255,255,255,0.2);
        }

        .label {
            display: block;
            color: var(--text-dim);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .value { font-size: 17px; font-weight: 700; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="ambient-glow"></div>

<div class="container">
    <div class="header">
        <h1>NEXUS ANALYSIS</h1>
        <p>Advanced Roblox Security & Metadata Engine</p>
    </div>

    <div class="search-box">
        <input type="text" id="gameInput" placeholder="Paste Roblox Link or Game ID">
        <button id="scanBtn">Analyze</button>
    </div>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-size: 13px; color: var(--text-dim); letter-spacing: 1px;">DECRYPTING METADATA...</p>
    </div>

    <div class="result-card" id="resultCard">
        <div class="thumbnail-area">
            <img id="gameThumb" src="" alt="Game Thumbnail">
            <div id="riskBadge" class="risk-badge">SCANNING...</div>
        </div>

        <div class="info-content">
            <h2 class="game-title" id="displayTitle">---</h2>
            <div class="creator-tag">By <strong id="displayCreator" style="color:white">---</strong></div>

            <div class="metrics-grid">
                <div class="metric-box">
                    <span class="label">Safety Score</span>
                    <div class="value" id="resScore">0%</div>
                </div>
                <div class="metric-box">
                    <span class="label">Total Visits</span>
                    <div class="value" id="resVisits">0</div>
                </div>
                <div class="metric-box">
                    <span class="label">Creator Age</span>
                    <div class="value" id="resAge">---</div>
                </div>
                <div class="metric-box">
                    <span class="label">Trust Level</span>
                    <div class="value" id="resStatus">---</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Uses window.location.origin to automatically talk to your Render backend
    const BACKEND_URL = window.location.origin;

    const scanBtn = document.getElementById('scanBtn');
    const input = document.getElementById('gameInput');
    const loader = document.getElementById('loader');
    const resultCard = document.getElementById('resultCard');

    // Automatically extracts the ID from a full Roblox URL
    function getCleanId(val) {
        const match = val.match(/games\/(\d+)/);
        return match ? match[1] : val.replace(/\D/g, '');
    }

    scanBtn.addEventListener('click', async () => {
        const cleanId = getCleanId(input.value.trim());
        
        if(!cleanId) {
            alert("Please provide a valid Roblox Link or ID.");
            return;
        }

        // UI Reset
        scanBtn.disabled = true;
        resultCard.style.display = 'none';
        resultCard.style.opacity = '0';
        resultCard.style.transform = 'translateY(20px)';
        loader.style.display = 'block';

        try {
            const response = await fetch(`${BACKEND_URL}/api/scan/${cleanId}`);
            const data = await response.json();

            if(data.error) throw new Error(data.error);

            // Update UI
            document.getElementById('gameThumb').src = data.thumbnail;
            document.getElementById('displayTitle').innerText = data.name;
            document.getElementById('displayCreator').innerText = data.creator;
            document.getElementById('resScore').innerText = data.safetyScore + "%";
            document.getElementById('resVisits').innerText = data.visits;
            document.getElementById('resAge').innerText = data.age;
            
            const badge = document.getElementById('riskBadge');
            const scoreVal = document.getElementById('resScore');
            const trustVal = document.getElementById('resStatus');

            // Set dynamic colors
            let color = "var(--success)";
            if(data.riskLevel === "MEDIUM") color = "var(--warning)";
            if(data.riskLevel === "HIGH") color = "var(--danger)";

            badge.innerText = `${data.riskLevel} RISK`;
            badge.style.color = color;
            scoreVal.style.color = color;
            trustVal.innerText = data.riskLevel === "LOW" ? "Verified" : "Unverified";
            trustVal.style.color = color;

            // Smooth Entrance
            loader.style.display = 'none';
            resultCard.style.display = 'block';
            setTimeout(() => {
                resultCard.style.opacity = '1';
                resultCard.style.transform = 'translateY(0)';
            }, 50);

        } catch (err) {
            alert("Error: Check if the ID is a Universe ID. (API currently requires Universe IDs)");
            loader.style.display = 'none';
        } finally {
            scanBtn.disabled = false;
        }
    });

    // Handle Enter Key
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') scanBtn.click(); });
</script>

</body>
</html>
