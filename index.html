<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Intelligence Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/themes/odometer-theme-minimal.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/odometer.js/0.4.7/odometer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --bg: #050507; --panel: #111116; --accent: #007aff; --success: #32d74b; --text-main: #ffffff; --text-dim: #98989d; --border: rgba(255, 255, 255, 0.08); --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .container { width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 30px; }
        .tabs { display: flex; flex-wrap: wrap; background: var(--glass); padding: 5px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; gap: 5px; }
        .tab-btn { flex: 1 1 30%; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 600; border-radius: 10px; font-size: 12px; }
        .tab-btn.active { background: var(--accent); color: white; }
        .view { display: none; } .view.active { display: block; }
        .search-box { background: var(--glass); border: 1px solid var(--border); padding: 8px; border-radius: 24px; display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        button.action { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 14px; cursor: pointer; font-weight: 700; }
        .result-card { background: var(--panel); border-radius: 28px; border: 1px solid var(--border); padding: 25px; margin-bottom: 20px; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .box { background: var(--glass); border: 1px solid var(--border); padding: 15px; border-radius: 18px; }
        .label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        .val { font-size: 18px; font-weight: 800; margin-top: 4px; }
        .odometer { font-family: inherit !important; }
        canvas { margin-top: 20px; max-width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>NEXUS</h1><p style="color:var(--text-dim); font-size:12px;">Universal Intelligence Suite</p></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gameView', this)">Game</button>
        <button class="tab-btn" onclick="switchTab('playerView', this)">Player</button>
        <button class="tab-btn" onclick="switchTab('liveView', this)">Live</button>
        <button class="tab-btn" onclick="switchTab('groupView', this)">Group</button>
        <button class="tab-btn" onclick="switchTab('ecoView', this)">Economy</button>
    </div>

    <div id="gameView" class="view active">
        <div class="search-box"><input type="text" id="gIn" placeholder="Game ID"><button class="action" onclick="scanGame()">Scan</button></div>
        <div id="gCard" class="result-card" style="display:none;">
            <h2 id="gTitle">---</h2>
            <div class="metrics">
                <div class="box"><p class="label">Safety</p><p id="gScore" class="val">---</p></div>
                <div class="box"><p class="label">Risk</p><p id="gRisk" class="val">---</p></div>
            </div>
        </div>
    </div>

    <div id="playerView" class="view">
        <div class="search-box"><input type="text" id="pIn" placeholder="Username"><button class="action" onclick="scanPlayer()">Scan</button></div>
        <div id="pCard" class="result-card" style="display:none;">
            <img id="pImg" style="width:60px; border-radius:50%; margin-bottom:10px;">
            <h2 id="pName">---</h2>
            <div class="metrics"><div class="box"><p class="label">Friends</p><p id="pFriends" class="val">---</p></div></div>
        </div>
    </div>

    <div id="liveView" class="view">
        <div class="search-box"><input type="text" id="lIn" placeholder="Live Game ID"><button class="action" id="lBtn" onclick="scanLive()">Connect</button></div>
        <div id="lCard" class="result-card" style="display:none;">
            <h2 id="lTitle">---</h2>
            <div class="metrics">
                <div class="box"><p class="label">Playing</p><div id="lPlaying" class="val odometer">0</div></div>
                <div class="box"><p class="label">Rating</p><div id="lRate" class="val">---</div></div>
            </div>
        </div>
    </div>

    <div id="groupView" class="view">
        <div class="search-box"><input type="text" id="groupIn" placeholder="Group ID"><button class="action" onclick="scanGroup()">Audit</button></div>
        <div id="groupCard" class="result-card" style="display:none;">
            <h2 id="groupName">---</h2>
            <div class="metrics">
                <div class="box"><p class="label">Owner</p><p id="groupOwner" class="val">---</p></div>
                <div class="box"><p class="label">Members</p><p id="groupMembers" class="val">---</p></div>
            </div>
        </div>
    </div>

    <div id="ecoView" class="view">
        <div class="result-card">
            <h2 id="ecoItem">Market Trends</h2>
            <p class="label">Recent Average Price (RAP)</p>
            <div id="ecoVal" class="val odometer" style="color:var(--success); font-size:32px;">0</div>
            <canvas id="ecoChart"></canvas>
        </div>
    </div>
</div>

<script>
    let liveInterval = null;
    let ecoInterval = null;
    let chart = null;

    function switchTab(id, btn) {
        clearInterval(liveInterval); clearInterval(ecoInterval);
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'ecoView') startEconomy();
    }

    async function scanGame() {
        const res = await fetch(`/api/scan/${document.getElementById('gIn').value}`);
        const data = await res.json();
        document.getElementById('gTitle').innerText = data.name;
        document.getElementById('gScore').innerText = data.score + "%";
        document.getElementById('gRisk').innerText = data.risk;
        document.getElementById('gCard').style.display = 'block';
    }

    async function scanPlayer() {
        const res = await fetch(`/api/player/${document.getElementById('pIn').value}`);
        const data = await res.json();
        document.getElementById('pName').innerText = data.name;
        document.getElementById('pFriends').innerText = data.friends;
        document.getElementById('pImg').src = data.thumb;
        document.getElementById('pCard').style.display = 'block';
    }

    async function scanLive() {
        const update = async () => {
            const res = await fetch(`/api/live/${document.getElementById('lIn').value}`);
            const data = await res.json();
            document.getElementById('lTitle').innerText = data.name;
            document.getElementById('lPlaying').innerHTML = data.playing.replace(/,/g,'');
            document.getElementById('lRate').innerText = data.rating;
            document.getElementById('lCard').style.display = 'block';
        };
        update();
        liveInterval = setInterval(update, 5000);
    }

    async function scanGroup() {
        const res = await fetch(`/api/group/${document.getElementById('groupIn').value}`);
        const data = await res.json();
        document.getElementById('groupName').innerText = data.name;
        document.getElementById('groupOwner').innerText = data.owner;
        document.getElementById('groupMembers').innerText = data.members;
        document.getElementById('groupCard').style.display = 'block';
    }

    function startEconomy() {
        const ctx = document.getElementById('ecoChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'RAP', data: [], borderColor: '#32d74b', tension: 0.4 }] },
            options: { scales: { y: { display: false }, x: { display: false } }, plugins: { legend: { display: false } } }
        });
        
        const updateEco = async () => {
            const res = await fetch('/api/economy');
            const data = await res.json();
            document.getElementById('ecoVal').innerHTML = data.rap;
            chart.data.labels.push("");
            chart.data.datasets[0].data.push(data.rap);
            if(chart.data.labels.length > 10) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update();
        };
        updateEco();
        ecoInterval = setInterval(updateEco, 3000);
    }
</script>
</body>
</html>
