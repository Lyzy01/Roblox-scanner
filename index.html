<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Roblox Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507; --panel: #111116; --accent: #007aff;
            --danger: #ff453a; --success: #32d74b; --warning: #ffcc00;
            --text-main: #ffffff; --text-dim: #98989d;
            --border: rgba(255, 255, 255, 0.08); --glass: rgba(255, 255, 255, 0.03);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        
        .ambient-glow { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); filter: blur(120px); opacity: 0.1; z-index: -1; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .container { width: 100%; max-width: 500px; z-index: 1; }

        .header { text-align: center; margin-bottom: 30px; animation: buildUp 0.8s ease forwards; }
        .header h1 { font-weight: 800; font-size: 32px; letter-spacing: -2px; }

        /* Tabs */
        .tabs { display: flex; background: var(--glass); padding: 5px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 600; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.5s ease; }

        /* Search & Results */
        .search-box { background: var(--glass); border: 1px solid var(--border); padding: 8px; border-radius: 24px; display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: transparent; border: none; outline: none; color: white; padding: 12px 18px; }
        button.action { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 16px; font-weight: 700; cursor: pointer; }

        .result-card { background: var(--panel); border-radius: 32px; border: 1px solid var(--border); overflow: hidden; padding: 30px; display: none; opacity: 0; transform: translateY(20px); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .box { background: var(--glass); border: 1px solid var(--border); padding: 15px; border-radius: 20px; }
        .label { font-size: 10px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        .val { font-size: 16px; font-weight: 700; margin-top: 5px; }

        @keyframes buildUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="ambient-glow"></div>

<div class="container">
    <div class="header">
        <h1>NEXUS SCANNER</h1>
        <p style="color: var(--text-dim); font-size: 12px;">Universal Integrity Audit</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('gameView', this)">Game Scan</button>
        <button class="tab-btn" onclick="switchTab('playerView', this)">Player Scan</button>
    </div>

    <div id="gameView" class="view active">
        <div class="search-box"><input type="text" id="gIn" placeholder="Game ID"><button class="action" onclick="scanGame()">Scan</button></div>
        <div id="gCard" class="result-card">
            <h2 id="gTitle">---</h2>
            <div class="metrics">
                <div class="box"><p class="label">Safety</p><p id="gScore" class="val">---</p></div>
                <div class="box"><p class="label">Risk</p><p id="gRisk" class="val">---</p></div>
            </div>
        </div>
    </div>

    <div id="playerView" class="view">
        <div class="search-box"><input type="text" id="pIn" placeholder="Username / UserID"><button class="action" onclick="scanPlayer()">Scan</button></div>
        <div id="pCard" class="result-card">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                <img id="pImg" src="" style="width:60px; height:60px; border-radius:50%; background:var(--glass);">
                <div><h2 id="pName" style="font-size:18px;">---</h2><p id="pDisplay" style="color:var(--text-dim); font-size:12px;">@---</p></div>
            </div>
            <div class="metrics">
                <div class="box"><p class="label">Integrity</p><p id="pInt" class="val">---</p></div>
                <div class="box"><p class="label">Friends</p><p id="pFriends" class="val">---</p></div>
                <div class="box"><p class="label">Joined</p><p id="pJoined" class="val">---</p></div>
                <div class="box"><p class="label">Verified</p><p id="pVer" class="val">---</p></div>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        btn.classList.add('active');
    }

    async function scanPlayer() {
        const query = document.getElementById('pIn').value;
        const card = document.getElementById('pCard');
        if(!query) return;

        try {
            const res = await fetch(`/api/player/${query}`);
            const data = await res.json();
            
            document.getElementById('pName').innerText = data.name;
            document.getElementById('pDisplay').innerText = "@" + data.displayName;
            document.getElementById('pImg').src = data.thumbnail;
            document.getElementById('pInt').innerText = data.integrity;
            document.getElementById('pInt').style.color = data.integrityColor;
            document.getElementById('pFriends').innerText = data.friends;
            document.getElementById('pJoined').innerText = data.joined;
            document.getElementById('pVer').innerText = data.verified ? "Yes" : "No";

            card.style.display = 'block';
            setTimeout(() => { card.style.opacity = '1'; card.style.transform = 'translateY(0)'; }, 50);
        } catch(e) { alert("Player not found."); }
    }

    async function scanGame() {
        const id = document.getElementById('gIn').value;
        const card = document.getElementById('gCard');
        try {
            const res = await fetch(`/api/scan/${id}`);
            const data = await res.json();
            document.getElementById('gTitle').innerText = data.name;
            document.getElementById('gScore').innerText = data.safetyScore + "%";
            document.getElementById('gRisk').innerText = data.riskLevel;
            card.style.display = 'block';
            setTimeout(() => { card.style.opacity = '1'; card.style.transform = 'translateY(0)'; }, 50);
        } catch(e) { alert("Game not found."); }
    }
</script>
</body>
</html>
