<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Roblox Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --panel: #111116;
            --accent: #007aff;
            --danger: #ff453a;
            --success: #32d74b;
            --warning: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #98989d;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; flex-direction: column; padding: 40px 0; }

        #introOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s ease, visibility 1s; }
        .ambient-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); filter: blur(120px); opacity: 0.15; z-index: -1; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .container { width: 100%; max-width: 500px; padding: 20px; z-index: 1; }
        
        .header { text-align: center; margin-bottom: 30px; animation: buildUp 0.8s forwards; }
        .header h1 { font-weight: 800; font-size: 32px; letter-spacing: -2px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: var(--glass); padding: 5px; border-radius: 15px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 600; border-radius: 10px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: white; }

        .view { display: none; }
        .view.active { display: block; }

        /* Inputs & Buttons */
        .search-box { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 8px; border-radius: 24px; display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; background: transparent; border: none; outline: none; color: white; padding: 12px 18px; font-size: 15px; }
        .main-btn { background: var(--accent); color: white; border: none; padding: 0 28px; border-radius: 16px; font-weight: 700; cursor: pointer; }

        /* Result Cards */
        .result-card { background: var(--panel); border-radius: 32px; border: 1px solid var(--border); overflow: hidden; padding: 30px; display: none; animation: buildUp 0.6s forwards; }
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
        .metric-box { background: var(--glass); border: 1px solid var(--border); padding: 18px; border-radius: 20px; }
        .label { display: block; color: var(--text-dim); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .value { font-size: 17px; font-weight: 700; }

        /* FAQ */
        .faq-section { margin-top: 40px; width: 100%; opacity: 0.7; }
        .faq-item { background: var(--glass); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; padding: 15px; cursor: pointer; font-size: 13px; }

        @keyframes buildUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="introOverlay">
    <h2 style="letter-spacing:6px; font-weight:800; margin-bottom:10px;">NEXUS</h2>
    <p style="color:var(--text-dim); font-size:12px;">DEVELOPED BY LYZY</p>
</div>

<div class="ambient-glow"></div>

<div class="container">
    <div class="header">
        <h1>ROBLOX SCANNER</h1>
        <p style="font-size: 12px; color: var(--text-dim);">Multi-Purpose Audit Engine</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('gameView', this)">Game Scan</button>
        <button class="tab-btn" onclick="showTab('playerView', this)">Player Scan</button>
    </div>

    <div id="gameView" class="view active">
        <div class="search-box">
            <input type="text" id="gameInput" placeholder="Game ID or Link">
            <button class="main-btn" onclick="scanGame()">Analyze</button>
        </div>
        <div id="gameResult" class="result-card">
            <h2 id="gName">---</h2>
            <div class="metrics-grid">
                <div class="metric-box"><span class="label">Safety</span><div id="gSafety" class="value">---</div></div>
                <div class="metric-box"><span class="label">Visits</span><div id="gVisits" class="value">---</div></div>
            </div>
        </div>
    </div>

    <div id="playerView" class="view">
        <div class="search-box">
            <input type="text" id="playerInput" placeholder="Username or UserID">
            <button class="main-btn" onclick="scanPlayer()">Identify</button>
        </div>
        <div id="playerResult" class="result-card">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                <img id="pThumb" src="" style="width:60px; height:60px; border-radius:50%; background:var(--glass);">
                <div>
                    <h2 id="pName" style="font-size:20px;">---</h2>
                    <p id="pDisplay" style="color:var(--text-dim); font-size:13px;">@---</p>
                </div>
            </div>
            <div class="metrics-grid">
                <div class="metric-box"><span class="label">Integrity</span><div id="pStatus" class="value">---</div></div>
                <div class="metric-box"><span class="label">Join Date</span><div id="pJoined" class="value">---</div></div>
                <div class="metric-box"><span class="label">Verified</span><div id="pVerified" class="value">---</div></div>
                <div class="metric-box"><span class="label">Friends</span><div id="pFriends" class="value">---</div></div>
            </div>
        </div>
    </div>

    <div class="faq-section">
        <div class="faq-item">How are bots detected? <strong>+</strong></div>
        <div class="faq-item">Is this official Roblox? <strong>+</strong></div>
    </div>
</div>

<script>
    function showTab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    // This would connect to your server.js /api/player/:id route
    async function scanPlayer() {
        const input = document.getElementById('playerInput').value;
        const card = document.getElementById('playerResult');
        card.style.display = 'block';
        
        // Mock Example for UI building logic:
        document.getElementById('pName').innerText = "Searching...";
        
        // Logic for Bot Detection (In your backend):
        // if (accountAge < 7 days && friends == 0 && hasNoBadges) return "Likely Bot";
    }

    window.onload = () => {
        setTimeout(() => { document.getElementById('introOverlay').style.opacity = '0'; 
        setTimeout(() => document.getElementById('introOverlay').remove(), 1000); }, 2000);
    };
</script>
</body>
</html>
